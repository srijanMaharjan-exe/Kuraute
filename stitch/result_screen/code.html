      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);

<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center overflow-x-hidden">
<!-- Top Navigation (Shell suppressed for transaction focus, using simple brand anchor) -->
<header class="w-full px-6 py-4 flex justify-between items-center sticky top-0 z-50">
<span class="text-2xl font-black text-white uppercase tracking-tight font-headline">KURAUTE</span>
<button class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-white">
<span class="material-symbols-outlined" data-icon="language">language</span>
</button>
</header>
<!-- Main Result Reveal Canvas -->
<main class="flex-1 w-full max-w-md px-6 pt-4 pb-12 flex flex-col items-center justify-center relative">
<!-- Background Elements -->
<div class="fixed inset-0 living-mandala-bg -z-10"></div>
<div class="absolute top-20 left-1/2 -translate-x-1/2 w-[140%] aspect-square bg-secondary/10 rounded-full blur-[100px] animate-pulse"></div>
<!-- The Revelation Card -->
<div class="w-full glass-card rounded-lg p-8 flex flex-col items-center text-center shadow-2xl relative overflow-hidden">
<!-- Cultural Pattern Detail -->
<div class="absolute -top-10 -right-10 w-40 h-40 border-[20px] border-secondary/20 rounded-full"></div>
<div class="mb-6">
<span class="material-symbols-outlined text-secondary text-6xl" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
<div class="space-y-2 mb-8">
<p class="text-secondary-fixed font-headline font-bold uppercase tracking-[0.2em] text-sm">THE IDENTITY REVEALED</p>
<h2 class="text-white font-devanagari text-4xl font-extrabold leading-tight">कुराउटे को थियो?</h2>
</div>
<!-- Result Hero -->
<div class="relative group mb-10">
<div class="absolute -inset-4 bg-secondary rounded-full blur-xl opacity-30"></div>
<div class="w-48 h-48 rounded-full border-4 border-secondary overflow-hidden bg-surface-container-highest relative z-10">
<img alt="Winner Portrait" class="w-full h-full object-cover" data-alt="dramatic portrait of a young man with mysterious expression, warm golden lighting, cinematic photography style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDCxw_4SFnM3Y2ARRPVAL1pntkCkEPUacqsZWkH-XkIZ5MjZujOHTsiBnsHBRsh_fD4x97RZVouNSWMDH5DZ3faVVNumphfE1RlCWGxVzGeYdUqXe5YWKzYqhqcMfTjHW5Dej3UOSx_fgFpx5Tyo-a_uYbdRfbbLu6ksXHaG-JJplopGVmSkPYnV-N8VUBITYyBywj6wT3DcFnrvti9b0iFABC7XTiWSKMjLWTz3EK6PX8PkXjpXtkr7rxKQM6fLeM_R75UzJ2E1Fc"/>
</div>
<div class="absolute -bottom-4 left-1/2 -translate-x-1/2 z-20 bg-secondary text-on-secondary px-6 py-2 rounded-full font-headline font-bold shadow-lg whitespace-nowrap">
          ARYAN SHARMA
        </div>
</div>
<div class="space-y-4">
<h1 class="text-white font-headline text-3xl font-extrabold tracking-tight">
          The Kuraute was <span class="text-secondary-fixed">Aryan</span>!
        </h1>
<p class="text-white/70 font-devanagari text-xl">
          अन्ततः कुराउटे पक्राउ पर्यो !
        </p>
</div>
</div>
<!-- Manual Vote Reminder (Contextual Social Hook) -->
<div class="mt-8 w-full glass-card rounded-xl p-6 border-l-4 border-secondary flex items-start gap-4">
<span class="material-symbols-outlined text-secondary-fixed text-2xl" data-icon="how_to_vote">how_to_vote</span>
<div class="text-left space-y-1">
<p class="text-white font-bold text-base leading-tight">Did you catch them?</p>
<p class="text-white/60 text-sm">Vote now in person with your group!</p>
<p class="text-secondary-fixed font-devanagari text-xs mt-1">व्यक्तिगत रूपमा भोट गर्नुहोस्!</p>
</div>
</div>
<!-- Primary Action (Tactile Pill) -->
<div class="mt-12 w-full space-y-4">
<button class="w-full py-5 rounded-full bg-secondary-container text-on-secondary-container font-headline font-black text-lg tracking-widest uppercase shadow-[0_12px_24px_rgba(119,99,0,0.3)] hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-3">
        PLAY AGAIN
        <span class="material-symbols-outlined text-xl" data-icon="replay">replay</span>
</button>
<button class="w-full py-4 rounded-full border border-white/20 text-white font-headline font-bold text-sm tracking-widest uppercase hover:bg-white/10 transition-colors">
        BACK TO LOBBY
      </button>
</div>

<div class="flex gap-2">
<div class="w-2 h-2 rounded-full bg-secondary"></div>
<div class="w-2 h-2 rounded-full bg-secondary"></div>

</div>
