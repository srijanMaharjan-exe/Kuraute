<!DOCTYPE html>

<html lang="en"><head>

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        backdrop-filter: blur(20px);
        background: rgba(233, 233, 218, 0.6);
      }
      .mandala-bg {
        background-image: radial-gradient(circle at center, rgba(202, 0, 51, 0.03) 0%, transparent 70%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col overflow-x-hidden">
<!-- TopAppBar Shell -->
<header class="bg-[#fefdf1] dark:bg-[#0d0f08] docked full-width top-0 z-50">
<div class="flex justify-between items-center w-full px-6 py-4">
<button class="text-[#ca0033] dark:text-[#ff757b] hover:bg-[#e9e9da] dark:hover:bg-[#25271e] transition-colors p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] tracking-tight headline-lg font-bold text-2xl font-black text-[#ca0033] dark:text-[#ff757b] uppercase">KURAUTE</h1>
<button class="text-[#ca0033] dark:text-[#ff757b] hover:bg-[#e9e9da] dark:hover:bg-[#25271e] transition-colors p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="language">language</span>
</button>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-6 pt-8 pb-24 mandala-bg relative">
<!-- Discussion Status Header -->
<div class="text-center mb-8">
<h2 class="font-headline font-extrabold text-4xl tracking-tighter text-on-surface mb-2">Discuss!</h2>
<p class="font-nepali text-2xl font-bold text-primary mb-1">छलफल गर्नुहोस्! कुराउटे को हो?</p>
<p class="font-body text-on-surface-variant font-medium opacity-80">Who is the Kuraute?</p>
</div>
<!-- Tension Timer: Visual Dominance -->
<div class="relative w-72 h-72 flex items-center justify-center mb-12">
<!-- Subtle Outer Glow -->
<div class="absolute inset-0 bg-secondary/10 rounded-full blur-3xl"></div>
<!-- Circular Progress SVG -->
<svg class="w-full h-full -rotate-90 transform" viewbox="0 0 100 100">
<!-- Track -->
<circle class="text-surface-container-highest" cx="50" cy="50" fill="transparent" r="45" stroke="currentColor" stroke-width="6"></circle>
<!-- Progress (Tension state: Gold to Crimson transition logic implied visually) -->
<circle class="text-secondary" cx="50" cy="50" fill="transparent" r="45" stroke="currentColor" stroke-dasharray="283" stroke-dashoffset="180" stroke-linecap="round" stroke-width="8"></circle>
</svg>
<!-- Inner Timer Display -->
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="font-headline font-black text-7xl text-on-surface tracking-tight">00:42</span>
<span class="font-label uppercase tracking-widest text-secondary font-bold text-xs mt-2">Time Left</span>
</div>
</div>
<!-- Player Bento Grid (Social Context) -->
<div class="grid grid-cols-2 gap-4 w-full max-w-md">
<!-- Active Speaker (Asymmetric treatment) -->
<div class="col-span-1 p-4 bg-surface-container-highest rounded-lg flex flex-col items-center space-y-2 relative overflow-hidden group">
<div class="w-16 h-16 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined text-3xl" data-icon="face">face</span>
</div>
<span class="font-bold text-on-surface">Aryan</span>
<div class="absolute top-2 right-2 flex space-x-1">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
</div>
</div>
<!-- Suspicious Player (Indigo-Slate/Tertiary) -->
<div class="col-span-1 p-4 bg-tertiary-container/20 rounded-lg flex flex-col items-center space-y-2">
<div class="w-16 h-16 rounded-full bg-tertiary-container flex items-center justify-center text-on-tertiary-container">
<span class="material-symbols-outlined text-3xl" data-icon="face_6">face_6</span>
</div>
<span class="font-bold text-on-surface">Sneha</span>
<span class="text-[10px] font-bold text-tertiary uppercase">Suspicious?</span>
</div>
<!-- Generic Player -->
<div class="col-span-1 p-4 bg-surface-container-low rounded-lg flex flex-col items-center space-y-2">
<div class="w-16 h-16 rounded-full bg-surface-variant flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-3xl" data-icon="person">person</span>
</div>
<span class="font-bold text-on-surface-variant">Prabhat</span>
</div>
<!-- Generic Player -->
<div class="col-span-1 p-4 bg-surface-container-low rounded-lg flex flex-col items-center space-y-2">
<div class="w-16 h-16 rounded-full bg-surface-variant flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-3xl" data-icon="person_4">person_4</span>
</div>
<span class="font-bold text-on-surface-variant">Megha</span>
</div>
</div>
<!-- Hint Banner -->
<div class="mt-8 w-full max-w-md p-4 glass-effect rounded-lg flex items-start space-x-4 border border-white/20">
<span class="material-symbols-outlined text-primary mt-1" data-icon="lightbulb">lightbulb</span>
<div class="flex flex-col">
<span class="font-headline font-bold text-sm text-primary-dim">Pro Tip:</span>
<p class="text-xs text-on-surface-variant font-medium">Watch for players who hesitate when asked about the Secret Topic.</p>
</div>
</div>
</main>
<!-- Footer Action Shell -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-surface/80 backdrop-blur-md">
<button class="w-full bg-primary text-on-primary py-5 rounded-xl font-headline font-extrabold text-lg tracking-tight shadow-[0_8px_24px_rgba(202,0,51,0.2)] active:scale-95 transition-all flex flex-col items-center justify-center">
<span>END DISCUSSION &amp; REVEAL</span>
<span class="font-nepali text-sm font-medium opacity-90">छलफल समाप्त गरी खुलासा गर्नुहोस्</span>
</button>
</div>
<!-- Navigation suppressed per "Task-Focused" rule -->
</body></html>
